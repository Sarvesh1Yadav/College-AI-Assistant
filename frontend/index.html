<!DOCTYPE html>
<html>
<head>
    <title>College AI Assistant</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
            padding: 50px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 500px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        #answer {
            margin-top: 20px;
            text-align: left;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎓 College AI Assistant</h2>

    <input type="text" id="question" placeholder="Ask your question..." />
    <br>
    <button onclick="ask()">Ask</button>

    <div id="answer"></div>
</div>

<script>
async function ask() {
    const question = document.getElementById("question").value;

    try {
        const response = await fetch(
            "https://pulp-crouton-thrill.ngrok-free.dev/ask?question=" + encodeURIComponent(question),
            { method: "POST" }
        );

        const data = await response.json();

        document.getElementById("answer").innerText = "Answer:\n" + data.answer;
    } catch (error) {
        document.getElementById("answer").innerText = "Error: Unable to fetch response";
        console.error(error);
    }
}
</script>

</body>
</html>
